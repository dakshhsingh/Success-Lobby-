<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Success Lobby - CPCC</title>
    <!-- Title of the page & html -->
    <style>
        /* Reset - makes all browsers look the same */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* body is the entire page */
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0d1b2a;
            color: white;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* center the page vertically & horizontally */
        }

        /* The white box of the login - controls the border & width */
        .login-card {
            background: #1a2f45;
            padding: 40px;
            border-radius: 16px;
            width: 360px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        /* The title at the top of the card */
        .logo {
            font-size: 28px;
            font-weight: bold;
            color: #4fc3f7;
            margin-bottom: 6px;
        }

        /* Small text below the logo */
        .subtitle {
            font-size: 13px;
            color: #90a4ae;
            margin-bottom: 30px;
        }

        /* It makes the input occupy the entire width of the card */
        input {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 16px;
            border-radius: 8px;
            border: 1px solid #2e4a63;
            background: #0d1b2a;
            color: white;
            font-size: 14px;
        }

        /* What happens when you click inside an input */
        input:focus {
            outline: none;
            border-color: #4fc3f7;
        }

        /* The login button */
        .btn-login {
            width: 100%;
            padding: 13px;
            background: #4fc3f7;
            color: #0d1b2a;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 4px;
        }

        /* Button color changes when you hover over it */
        .btn-login:hover {
            background: #81d4fa;
        }

        /* Small terms text at the bottom */
        .terms {
            font-size: 12px;
            color: #90a4ae;
            margin-top: 20px;
        }

        /* Style for the Terms & Policy link */
        .terms a {
            color: #4fc3f7;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <!-- Login card - groups things and connects the div with the CSS -->
    <div class="login-card">

        <!-- Logo and college name -->
        <div class="logo">🎓 The Success Lobby</div>
        <div class="subtitle">Central Piedmont Community College</div>

        <!-- id="username" makes the input unique so JavaScript can find it -->
        <input type="text" id="username" placeholder="CPCC Username (e.g. jcastillo)" />
        <input type="password" id="password" placeholder="Password" />

        <!-- onclick="login()" executes the login function when clicked -->
        <button class="btn-login" onclick="login()">Log In</button>

        <p class="terms">
            By logging in you agree to our <a href="#">Terms & Policy</a>
        </p>

    </div>

    <script>
        /* function login() defines what happens when you click the button.
           getElementById searches the input by its id and reads what you typed.
           If the box is empty it shows an alert and stops.
           If both fields are filled it welcomes the user by name. */
        function login() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            /* check if either field is empty */
            if (user === '' || pass === '') {
                alert('Please enter your username and password.');
                return;
            }

            /* if everything is ok, welcome the user */
           localStorage.setItem('cpcc-user', user);
window.location.href = 'Lobby.html';
        }
    </script>

</body>
</html>
